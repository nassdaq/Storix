# XcodeGen config — produces Storix.xcodeproj from this declarative spec.
#
# One-time setup:  brew install xcodegen
# Generate:        xcodegen generate
# Open:            open Storix.xcodeproj
#
# The Xcode project consumes the same SwiftPM package that `swift build` uses,
# so there is no duplicated source-file list to keep in sync.

name: Storix
options:
  bundleIdPrefix: galacha.industries
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    PRODUCT_BUNDLE_IDENTIFIER: "galacha.industries.Storix"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"                                 # ad-hoc by default
    ENABLE_HARDENED_RUNTIME: YES
    SWIFT_STRICT_CONCURRENCY: minimal
    DEAD_CODE_STRIPPING: YES
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

packages:
  Storix:
    path: .

targets:
  Storix:
    type: application
    platform: macOS
    sources:
      - path: App
        excludes:
          - "Info.plist"
          - "Storix.entitlements"
    info:
      path: App/Info.plist
    entitlements:
      path: App/Storix.entitlements
    dependencies:
      - package: Storix
        product: StorixCore
      - package: Storix
        product: StorixCleaner
      - package: Storix
        product: StorixAI
      - package: Storix
        product: StorixAgent
      - package: Storix
        product: StorixUI
    settings:
      base:
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/Storix.entitlements
        PRODUCT_NAME: Storix
        GENERATE_INFOPLIST_FILE: NO

schemes:
  Storix:
    build:
      targets:
        Storix: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
